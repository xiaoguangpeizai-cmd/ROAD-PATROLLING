<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>高雄市道路巡查工具</title>
    
    <!-- PWA / Web App Capabilities -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#059669"> <!-- Tailwind Emerald 600 -->
    <meta name="description" content="高雄市道路巡查與異常標記系統">

    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Leaflet CSS for Map -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    
    <style>
        /* Prevent pull-to-refresh on mobile devices and ensure full height */
        html, body { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%; 
            font-family: 'Inter', 'Noto Sans TC', sans-serif; 
            overflow: hidden; 
            overscroll-behavior-y: none; /* Disable pull-to-refresh */
        }
        
        #map { height: 100%; width: 100%; z-index: 10; }
        .sidebar { z-index: 1000; box-shadow: -2px 0 15px rgba(0,0,0,0.1); }
        
        /* Custom scrollbar for record list */
        .record-list::-webkit-scrollbar { width: 6px; }
        .record-list::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px;}
        .record-list::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .record-list::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        /* Pulse animation for current location */
        .gps-pulse {
            background-color: #3b82f6;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 3px solid white;
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.8);
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(59, 130, 246, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); }
        }
    </style>
</head>
<body class="bg-gray-100 flex flex-col md:flex-row h-screen w-screen text-gray-800">

    <!-- Map Container -->
    <div class="flex-grow h-[55vh] md:h-screen relative">
        <div id="map"></div>
        
        <!-- Status Badge overlay on map -->
        <div class="absolute top-safe-pt top-4 left-4 z-[400] bg-white/95 backdrop-blur-sm px-4 py-2 rounded-full shadow-md flex items-center gap-2 border border-gray-200">
            <div id="statusIndicator" class="w-3 h-3 rounded-full bg-gray-400"></div>
            <span id="statusText" class="text-sm font-semibold text-gray-700">尚未開始巡查</span>
        </div>
        
        <!-- Centering Button -->
        <button onclick="centerMapToCurrent()" class="absolute bottom-6 right-4 z-[400] bg-white w-12 h-12 rounded-full shadow-lg flex items-center justify-center text-gray-700 hover:bg-blue-50 hover:text-blue-600 focus:outline-none transition border border-gray-200">
            <i class="fa-solid fa-location-crosshairs text-xl"></i>
        </button>
    </div>

    <!-- Sidebar / Control Panel -->
    <div class="sidebar w-full md:w-[400px] bg-white flex flex-col h-[45vh] md:h-screen border-t md:border-t-0 md:border-l border-gray-200 safe-pb">
        <!-- Header -->
        <div class="p-4 md:p-5 border-b border-emerald-700 bg-emerald-600 text-white flex justify-between items-center shadow-sm">
            <h1 class="text-lg font-bold flex items-center gap-2">
                <i class="fa-solid fa-road"></i> 高雄市道路巡查工具
            </h1>
            <div class="flex items-center gap-2">
                <!-- Export Button -->
                <button onclick="exportData()" id="btnExport" class="text-white hover:text-emerald-100 focus:outline-none transition bg-emerald-700/50 hover:bg-emerald-700 w-8 h-8 rounded-full flex items-center justify-center" title="匯出CSV紀錄" style="display:none;">
                    <i class="fa-solid fa-download text-sm"></i>
                </button>
                <!-- Help Button -->
                <button onclick="openHelpModal()" class="text-white hover:text-emerald-100 focus:outline-none transition bg-emerald-700/50 hover:bg-emerald-700 w-8 h-8 rounded-full flex items-center justify-center" title="操作說明">
                    <i class="fa-solid fa-question text-sm"></i>
                </button>
            </div>
        </div>

        <!-- Controls -->
        <div class="p-3 md:p-4 border-b border-gray-100 bg-gray-50">
            <div class="grid grid-cols-2 gap-3 mb-2">
                <button id="btnStart" onclick="startTracking()" class="bg-blue-600 hover:bg-blue-700 text-white font-medium py-2.5 px-4 rounded-xl shadow-sm transition flex items-center justify-center gap-2 active:scale-95">
                    <i class="fa-solid fa-play"></i> 開始巡查
                </button>
                <button id="btnStop" onclick="stopTracking()" class="bg-red-500 hover:bg-red-600 text-white font-medium py-2.5 px-4 rounded-xl shadow-sm transition flex items-center justify-center gap-2 opacity-50 cursor-not-allowed active:scale-95" disabled>
                    <i class="fa-solid fa-stop"></i> 結束巡查
                </button>
            </div>
            
            <div class="text-[11px] text-gray-500 font-mono bg-white p-2 rounded-lg border border-gray-200 flex justify-between items-center">
                <span class="flex items-center gap-1"><i class="fa-solid fa-satellite-dish text-gray-400"></i> 目前座標:</span>
                <span id="currentCoord" class="font-semibold text-gray-700">等待定位中...</span>
            </div>
        </div>

        <!-- Reporting Section -->
        <div class="p-3 md:p-4 border-b border-gray-100">
            <h2 class="text-sm font-semibold text-gray-700 mb-2 flex items-center gap-1">
                <i class="fa-solid fa-bolt text-yellow-500"></i> 快速標記異常位置
            </h2>
            <div class="grid grid-cols-3 gap-2">
                <button onclick="addMarker('道路坑洞', 'red')" class="flex flex-col items-center justify-center py-2 px-1 bg-white hover:bg-red-50 text-gray-700 hover:text-red-700 rounded-xl border border-gray-200 hover:border-red-300 transition shadow-sm active:scale-95 disabled:opacity-40 disabled:cursor-not-allowed" disabled id="btnPothole">
                    <i class="fa-solid fa-circle-exclamation mb-1.5 text-xl text-red-500"></i>
                    <span class="text-[11px] font-bold">道路坑洞</span>
                </button>
                <button onclick="addMarker('標線磨損', 'orange')" class="flex flex-col items-center justify-center py-2 px-1 bg-white hover:bg-orange-50 text-gray-700 hover:text-orange-700 rounded-xl border border-gray-200 hover:border-orange-300 transition shadow-sm active:scale-95 disabled:opacity-40 disabled:cursor-not-allowed" disabled id="btnLine">
                    <i class="fa-solid fa-brush mb-1.5 text-xl text-orange-500"></i>
                    <span class="text-[11px] font-bold">標線磨損</span>
                </button>
                <button onclick="addMarker('設施損壞', 'purple')" class="flex flex-col items-center justify-center py-2 px-1 bg-white hover:bg-purple-50 text-gray-700 hover:text-purple-700 rounded-xl border border-gray-200 hover:border-purple-300 transition shadow-sm active:scale-95 disabled:opacity-40 disabled:cursor-not-allowed" disabled id="btnFacility">
                    <i class="fa-solid fa-triangle-exclamation mb-1.5 text-xl text-purple-500"></i>
                    <span class="text-[11px] font-bold">設施損壞</span>
                </button>
            </div>
        </div>

        <!-- Log / Records -->
        <div class="flex-grow overflow-hidden flex flex-col p-3 md:p-4 bg-gray-50 pb-safe">
            <div class="flex justify-between items-end mb-2">
                <h2 class="text-sm font-semibold text-gray-700">通報紀錄 (<span id="recordCount" class="text-emerald-600">0</span>)</h2>
            </div>
            <div id="recordList" class="record-list flex-grow overflow-y-auto space-y-2 pr-1 pb-4">
                <!-- Records will be injected here -->
                <div class="flex flex-col items-center justify-center h-full text-gray-400 space-y-2 opacity-60" id="emptyState">
                    <i class="fa-regular fa-folder-open text-3xl"></i>
                    <span class="text-xs">尚未建立通報紀錄</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Help Modal -->
    <div id="helpModal" class="fixed inset-0 bg-gray-900/60 backdrop-blur-sm z-[2000] hidden flex-col justify-end md:justify-center items-center transition-opacity duration-300 opacity-0">
        <div class="bg-white w-full md:w-[450px] md:rounded-2xl rounded-t-3xl p-6 shadow-2xl transform transition-transform duration-300 translate-y-full md:translate-y-8 md:scale-95" id="helpModalContent">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-bold text-gray-800 flex items-center gap-2">
                    <i class="fa-solid fa-mobile-screen-button text-emerald-600"></i> 操作指南
                </h3>
                <button onclick="closeHelpModal()" class="text-gray-400 hover:bg-gray-100 hover:text-gray-600 rounded-full w-8 h-8 flex items-center justify-center focus:outline-none transition bg-gray-50">
                    <i class="fa-solid fa-xmark text-lg"></i>
                </button>
            </div>
            
            <div class="space-y-5 text-sm text-gray-600 max-h-[60vh] overflow-y-auto pr-2">
                <div class="flex gap-4">
                    <div class="flex-shrink-0 w-8 h-8 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center font-bold shadow-sm">1</div>
                    <div>
                        <h4 class="font-bold text-gray-800 text-base mb-1">允許定位權限</h4>
                        <p class="leading-relaxed">點擊「開始巡查」時，請於瀏覽器彈出視窗選擇<strong>「允許」</strong>，系統才能記錄您的移動軌跡與通報座標。</p>
                    </div>
                </div>
                <div class="flex gap-4">
                    <div class="flex-shrink-0 w-8 h-8 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center font-bold shadow-sm">2</div>
                    <div>
                        <h4 class="font-bold text-gray-800 text-base mb-1">將工具加入手機主畫面</h4>
                        <p class="leading-relaxed">點擊瀏覽器選單的<strong>「加入主畫面」</strong>或<strong>「安裝應用程式」</strong>，可享受全螢幕、無干擾的 App 體驗。</p>
                    </div>
                </div>
                <div class="flex gap-4">
                    <div class="flex-shrink-0 w-8 h-8 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center font-bold shadow-sm">3</div>
                    <div>
                        <h4 class="font-bold text-gray-800 text-base mb-1">一鍵標記異常與匯出</h4>
                        <p class="leading-relaxed">發現異常時，點選對應的按鈕即可記錄座標。巡查結束後，點擊畫面上方的 <i class="fa-solid fa-download text-emerald-600 mx-1"></i> 按鈕可將資料匯出為 CSV 報表。</p>
                    </div>
                </div>
            </div>
            
            <div class="mt-8 pt-4 border-t border-gray-100 text-center pb-safe">
                <button onclick="closeHelpModal()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3.5 px-4 rounded-xl transition shadow-md active:scale-95">
                    開始使用
                </button>
            </div>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        // --- State Variables ---
        let map;
        let isTracking = false;
        let watchId = null;
        let currentPos = null; // {lat, lng}
        let pathCoordinates = []; // Array of LatLng for polyline
        let polyline = null;
        let currentLocationMarker = null;
        
        // Data Store for Export
        let collectedData = []; 
        let recordCounter = 0;

        // Kaohsiung City Center coordinates (Lingya District focus)
        const KAOHSIUNG_CENTER = [22.6273, 120.3014];

        // --- Initialize Map ---
        function initMap() {
            // Initialize Leaflet map
            map = L.map('map', {
                zoomControl: false,
                attributionControl: false // Hide attribution to save space on mobile, will add custom one
            }).setView(KAOHSIUNG_CENTER, 14);

            L.control.zoom({ position: 'bottomright' }).addTo(map);
            L.control.attribution({position: 'bottomleft'}).addAttribution('&copy; OpenStreetMap').addTo(map);

            // Add OpenStreetMap tiles
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                maxZoom: 19
            }).addTo(map);

            // Initialize Polyline for tracking route
            polyline = L.polyline([], {
                color: '#2563eb', // Tailwind blue-600
                weight: 6,
                opacity: 0.7,
                smoothFactor: 1,
                lineCap: 'round',
                lineJoin: 'round'
            }).addTo(map);
        }

        // --- Tracking Functions ---
        function startTracking() {
            if (!navigator.geolocation) {
                showToast("您的裝置或瀏覽器不支援定位功能", "error");
                return;
            }

            isTracking = true;
            updateUIState();
            showToast("正在搜尋GPS訊號...", "info");

            // Options for high accuracy GPS
            const geoOptions = {
                enableHighAccuracy: true,
                maximumAge: 3000,
                timeout: 10000
            };

            // Start watching position
            watchId = navigator.geolocation.watchPosition(
                onLocationUpdate,
                onLocationError,
                geoOptions
            );
        }

        function stopTracking() {
            if (watchId !== null) {
                navigator.geolocation.clearWatch(watchId);
                watchId = null;
            }
            isTracking = false;
            updateUIState();
            showToast("已結束巡查紀錄", "info");
        }

        function onLocationUpdate(position) {
            const lat = position.coords.latitude;
            const lng = position.coords.longitude;
            
            // First time lock check
            if(!currentPos) {
                showToast("已成功鎖定位置", "success");
            }
            
            currentPos = { lat, lng };
            const latLng = [lat, lng];

            // Update coordinate display
            document.getElementById('currentCoord').innerText = `${lat.toFixed(5)}, ${lng.toFixed(5)}`;

            // Record path
            pathCoordinates.push(latLng);
            polyline.setLatLngs(pathCoordinates);

            // Update or create current location marker
            if (!currentLocationMarker) {
                const pulseIcon = L.divIcon({
                    className: 'custom-div-icon',
                    html: "<div class='gps-pulse'></div>",
                    iconSize: [22, 22],
                    iconAnchor: [11, 11]
                });
                currentLocationMarker = L.marker(latLng, { icon: pulseIcon }).addTo(map);
                
                // Pan to center on the FIRST location update
                map.setView(latLng, 16);
            } else {
                currentLocationMarker.setLatLng(latLng);
            }
        }

        function onLocationError(error) {
            console.warn(`ERROR(${error.code}): ${error.message}`);
            let msg = "無法取得位置，請確認 GPS 已開啟。";
            if(error.code === 1) msg = "請允許瀏覽器的定位權限設定。";
            
            document.getElementById('statusText').innerText = "定位中斷";
            document.getElementById('statusIndicator').className = "w-3 h-3 rounded-full bg-red-500 animate-none";
            
            showToast(msg, "error");
        }

        function centerMapToCurrent() {
            if (currentPos) {
                map.setView([currentPos.lat, currentPos.lng], 17, { animate: true });
            } else {
                showToast("尚未取得目前位置", "warning");
            }
        }

        // --- UI & Event Functions ---
        function updateUIState() {
            const btnStart = document.getElementById('btnStart');
            const btnStop = document.getElementById('btnStop');
            const statusInd = document.getElementById('statusIndicator');
            const statusText = document.getElementById('statusText');
            
            // Reporting buttons
            const buttons = ['btnPothole', 'btnLine', 'btnFacility'];

            if (isTracking) {
                btnStart.disabled = true;
                btnStart.classList.add('opacity-50', 'cursor-not-allowed', 'hidden');
                btnStop.disabled = false;
                btnStop.classList.remove('opacity-50', 'cursor-not-allowed', 'hidden');
                
                statusInd.className = "w-3 h-3 rounded-full bg-green-500 animate-pulse shadow-[0_0_8px_rgba(34,197,94,0.6)]";
                statusText.innerText = "巡查紀錄中...";

                buttons.forEach(id => document.getElementById(id).disabled = false);
            } else {
                btnStart.disabled = false;
                btnStart.classList.remove('opacity-50', 'cursor-not-allowed', 'hidden');
                btnStop.disabled = true;
                btnStop.classList.add('opacity-50', 'cursor-not-allowed', 'hidden');
                
                statusInd.className = "w-3 h-3 rounded-full bg-gray-400 animate-none shadow-none";
                statusText.innerText = "已暫停巡查";

                buttons.forEach(id => document.getElementById(id).disabled = true);
            }
        }

        function addMarker(type, colorContext) {
            if (!currentPos) {
                showToast("尚未取得定位，無法標記。", "error");
                return;
            }

            const latLng = [currentPos.lat, currentPos.lng];
            const now = new Date();
            const timeStr = now.toLocaleTimeString('zh-TW', { hour12: false });
            const dateStr = now.toISOString().split('T')[0]; // YYYY-MM-DD
            recordCounter++;

            // Save to Data Array for Export
            collectedData.push({
                id: recordCounter,
                date: dateStr,
                time: timeStr,
                type: type,
                lat: currentPos.lat.toFixed(6),
                lng: currentPos.lng.toFixed(6)
            });

            // Show export button if hidden
            document.getElementById('btnExport').style.display = 'flex';

            // Map standard colors
            let markerColor = '#ef4444'; // red
            if (colorContext === 'orange') markerColor = '#f97316';
            if (colorContext === 'purple') markerColor = '#a855f7';

            // Create a styled circle marker on map
            const anomalyMarker = L.circleMarker(latLng, {
                radius: 7,
                fillColor: markerColor,
                color: "#ffffff",
                weight: 2,
                opacity: 1,
                fillOpacity: 0.9
            }).addTo(map);

            const popupContent = `<div class="font-bold text-gray-800 border-b pb-1 mb-1">${type}</div>
                                  <div class="text-xs text-gray-600">時間: ${timeStr}<br>座標: ${currentPos.lat.toFixed(5)}, ${currentPos.lng.toFixed(5)}</div>`;
            anomalyMarker.bindPopup(popupContent);

            // Add to Sidebar List
            addRecordToList(type, timeStr, colorContext, latLng);
            
            // Haptic feedback for mobile (if supported)
            if(navigator.vibrate) navigator.vibrate(50);
            
            showToast(`已標記：${type}`, "success");
        }

        function addRecordToList(type, time, colorContext, latLng) {
            const listDiv = document.getElementById('recordList');
            const emptyState = document.getElementById('emptyState');
            if (emptyState) emptyState.remove();

            // Update Counter
            document.getElementById('recordCount').innerText = recordCounter;

            // Determine Tailwind styling
            let textClass = "text-red-600", borderClass = "border-red-200", bgClass = "bg-red-50", icon = "fa-circle-exclamation";
            if (colorContext === 'orange') { textClass = "text-orange-500"; borderClass = "border-orange-200"; bgClass="bg-orange-50"; icon = "fa-brush"; }
            if (colorContext === 'purple') { textClass = "text-purple-500"; borderClass = "border-purple-200"; bgClass="bg-purple-50"; icon = "fa-triangle-exclamation"; }

            const recordHtml = `
                <div class="bg-white border ${borderClass} p-3 rounded-xl shadow-sm flex items-start gap-3 cursor-pointer hover:shadow-md transition active:scale-[0.98]" onclick="map.setView([${latLng[0]}, ${latLng[1]}], 18)">
                    <div class="${bgClass} ${textClass} w-10 h-10 rounded-full flex items-center justify-center flex-shrink-0 mt-0.5">
                        <i class="fa-solid ${icon} text-lg"></i>
                    </div>
                    <div class="flex-grow">
                        <div class="font-bold text-sm text-gray-800">${type}</div>
                        <div class="text-[11px] text-gray-500 font-mono mt-1 flex items-center gap-1">
                            <i class="fa-solid fa-location-dot text-gray-400"></i> ${latLng[0].toFixed(5)}, ${latLng[1].toFixed(5)}
                        </div>
                    </div>
                    <div class="text-xs font-semibold text-gray-500 bg-gray-100 px-2 py-1 rounded-md">
                        ${time}
                    </div>
                </div>
            `;
            
            // Insert at top
            listDiv.insertAdjacentHTML('afterbegin', recordHtml);
        }

        // --- Export Data Function ---
        function exportData() {
            if (collectedData.length === 0) {
                showToast("目前沒有資料可供匯出", "warning");
                return;
            }

            // Create CSV content
            let csvContent = "編號,日期,時間,異常類型,緯度,經度\n";
            collectedData.forEach(row => {
                csvContent += `${row.id},${row.date},${row.time},${row.type},${row.lat},${row.lng}\n`;
            });

            // Create a Blob and trigger download
            const blob = new Blob(["\uFEFF" + csvContent], { type: 'text/csv;charset=utf-8;' }); // \uFEFF for Excel UTF-8 BOM
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            
            const dateStr = new Date().toISOString().split('T')[0].replace(/-/g, '');
            link.setAttribute("href", url);
            link.setAttribute("download", `高雄巡查紀錄_${dateStr}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            
            showToast("已下載巡查紀錄報表", "success");
        }

        // Custom Toast Notification
        function showToast(message, type = "info") {
            // Remove existing toast if any
            const existing = document.getElementById('app-toast');
            if(existing) existing.remove();

            const toast = document.createElement('div');
            toast.id = 'app-toast';
            
            let bg = "bg-gray-800/90";
            let icon = "fa-info-circle";
            let textCol = "text-white";
            
            if(type === "error") { bg = "bg-red-600/95"; icon = "fa-xmark-circle"; }
            if(type === "success") { bg = "bg-emerald-600/95"; icon = "fa-check-circle"; }
            if(type === "warning") { bg = "bg-yellow-500/95"; icon = "fa-exclamation-triangle"; textCol="text-gray-900"; }

            toast.className = `fixed top-6 left-1/2 transform -translate-x-1/2 ${bg} ${textCol} backdrop-blur-sm px-5 py-2.5 rounded-full shadow-lg z-[3000] flex items-center gap-2 transition-all duration-300 translate-y-[-20px] opacity-0 text-sm font-medium w-max max-w-[90%] pointer-events-none`;
            toast.innerHTML = `<i class="fa-solid ${icon}"></i> <span>${message}</span>`;
            
            document.body.appendChild(toast);
            
            // Trigger animation in
            requestAnimationFrame(() => {
                toast.classList.remove('translate-y-[-20px]', 'opacity-0');
                toast.classList.add('translate-y-0', 'opacity-100');
            });
            
            // Remove after delay
            setTimeout(() => {
                toast.classList.remove('translate-y-0', 'opacity-100');
                toast.classList.add('translate-y-[-20px]', 'opacity-0');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // --- Help Modal Functions ---
        function openHelpModal() {
            const modal = document.getElementById('helpModal');
            const content = document.getElementById('helpModalContent');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            
            requestAnimationFrame(() => {
                modal.classList.remove('opacity-0');
                content.classList.remove('translate-y-full', 'md:translate-y-8', 'md:scale-95');
                content.classList.add('translate-y-0', 'md:scale-100');
            });
        }

        function closeHelpModal() {
            const modal = document.getElementById('helpModal');
            const content = document.getElementById('helpModalContent');
            
            modal.classList.add('opacity-0');
            content.classList.remove('translate-y-0', 'md:scale-100');
            content.classList.add('translate-y-full', 'md:translate-y-8', 'md:scale-95');
            
            setTimeout(() => {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
            }, 300);
        }

        function checkFirstLoad() {
            if (!localStorage.getItem('hasSeenPatrolHelp')) {
                setTimeout(openHelpModal, 800);
                localStorage.setItem('hasSeenPatrolHelp', 'true');
            }
        }

        // Run on load
        window.onload = function() {
            initMap();
            checkFirstLoad();
            
            // Detect iOS for specific UI tweaks if necessary
            const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
            if(isIOS) {
                document.body.classList.add('ios-device');
                // Adds extra padding at bottom for modern iPhones (Safe Area)
                const safeStyle = document.createElement('style');
                safeStyle.innerHTML = `.safe-pb { padding-bottom: env(safe-area-inset-bottom, 20px); } .top-safe-pt { top: calc(env(safe-area-inset-top, 0px) + 16px) !important; }`;
                document.head.appendChild(safeStyle);
            }
        };
    </script>
</body>
</html>
